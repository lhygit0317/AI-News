<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;max-width:780px;margin:0 auto;padding:20px;color:#222;line-height:1.75;font-size:15px}
h1{color:#1a56db;border-bottom:3px solid #1a56db;padding-bottom:10px;font-size:22px}
h2{color:#333;margin-top:35px;padding:10px 14px;border-left:5px solid #1a56db;background:#f0f4ff;font-size:18px}
h3{color:#555;font-size:16px;margin-top:20px}
table{width:100%;border-collapse:collapse;margin:15px 0;font-size:14px}
th{background:#1a56db;color:#fff;padding:10px 12px;text-align:left;font-weight:600}
td{padding:10px 12px;border-bottom:1px solid #dde;vertical-align:top}
tr:nth-child(even){background:#f8f9fc}
blockquote{background:#f0f7ff;padding:12px 15px;border-left:3px solid #1a56db;margin:12px 0;color:#2d3748}
ul{padding-left:20px}
li{margin:4px 0}
.meta{color:#888;font-size:13px;margin-bottom:20px}
.footer{margin-top:40px;padding-top:20px;border-top:2px solid #e2e8f0;color:#a0aec0;font-size:12px}
a{color:#1a56db}
</style>
</head>
<body>

<h1>超聚变(xFusion)行业周报</h1>
<p class="meta"><strong>周期：</strong>{date_range} &nbsp;|&nbsp; <strong>生成时间：</strong>{timestamp}</p>

{report_body_html}

<div class="footer">
<p>此报告由 Hermes Agent 自动生成，基于公开新闻源和情报采集流程整理。</p>
<p>报告文件：{filename}</p>
</div>

</body>
</html>
